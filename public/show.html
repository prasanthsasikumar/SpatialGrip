<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpatialGrip — Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* Three.js canvas fills viewport */
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* Small picture-in-picture video preview */
    #pip-video {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 240px;
      height: 180px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      object-fit: cover;
      z-index: 10;
      background: #111;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 13px;
      opacity: 0.7;
      z-index: 10;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: #f44;
    }
    #status.connected .dot { background: #4f4; }

    /* HUD overlay for debug info */
    #hud {
      position: fixed;
      top: 12px;
      right: 16px;
      font-size: 11px;
      opacity: 0.5;
      z-index: 10;
      text-align: right;
      line-height: 1.6;
    }

    /* Room code panel — floats over the 3D scene */
    #room-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.85);
      padding: 36px 48px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: opacity 0.4s, transform 0.4s;
    }
    #room-panel.connected {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.95);
    }
    #room-panel .label {
      font-size: 13px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #room-code {
      font-size: 48px;
      font-family: monospace;
      letter-spacing: 0.2em;
      color: #00ccff;
      user-select: all;
    }
    #qr-code {
      width: 180px;
      height: 180px;
      border-radius: 8px;
      background: #111;
    }
    #room-panel .hint {
      font-size: 12px;
      opacity: 0.4;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div id="status"><span class="dot"></span>Initialising…</div>
  <div id="hud"></div>

  <!-- Room code panel -->
  <div id="room-panel">
    <div class="label">Room Code</div>
    <div id="room-code">------</div>
    <img id="qr-code" />
    <div class="hint">Open <b>/read</b> on your phone and enter this code<br>or scan the QR code</div>
  </div>

  <canvas id="three-canvas"></canvas>
  <video id="pip-video" autoplay playsinline muted></video>

  <!-- PeerJS (handles signaling via free cloud server) -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <!-- Three.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- App modules -->
  <script src="/js/config.js"></script>
  <script src="/js/gestureInterpreter.js"></script>
  <script src="/js/sceneManager.js"></script>
  <script src="/js/viewerClient.js"></script>

</body>
</html>
